<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Myanmar Text, Arial, sans-serif;
}

body{
    background:#f4f6f9;
}

header{
    background:linear-gradient(135deg,#d4af37,#b8860b);
    color:white;
    text-align:center;
    padding:30px 20px;
}

header h1{
    font-size:32px;
    margin-bottom:10px;
}

.container{
    width:90%;
    max-width:800px;
    margin:30px auto;
}

.card{
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0 4px 15px rgba(0,0,0,0.15);
    text-align:center;
}

.card-image{
    width:250px;
    height:250px;
    object-fit:cover;
    border-radius:50%;
    border:6px solid #d4af37;
    display:block;
    margin:0 auto 20px;
    box-shadow:0 0 20px rgba(212,175,55,0.5);
}

.card h2{
    color:#b8860b;
    margin-bottom:15px;
    font-size:28px;
}

.card p{
    font-size:18px;
    color:#444;
    line-height:1.8;
}

.btn{
    display:inline-block;
    margin-top:20px;
    padding:14px 28px;
    background:#0088cc;
    color:white;
    text-decoration:none;
    border-radius:8px;
    font-size:18px;
    font-weight:bold;
    transition:0.3s;
}

.btn:hover{
    background:#006699;
    transform:scale(1.05);
}

footer{
    text-align:center;
    padding:20px;
    background:#222;
    color:white;
    margin-top:40px;
}
</style>
</head>
<body>

<header>
    <h1>ရွှေတံခါးဆေး</h1>
    <p>အလှူခံရရှိနိုင်သော နေရာများ</p>
</header>

<div class="container">

    <div class="card">

             class="card-image">
